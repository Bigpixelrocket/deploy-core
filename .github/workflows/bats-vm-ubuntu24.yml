name: BATS VM Tests (Ubuntu 24.04)

permissions:
  contents: read
  actions: read

on:
  workflow_run:
    workflows: ["Pest", "PHPStan", "Pint", "Rector", "CI Canary"]
    types: [completed]

jobs:
  quality-gate:
    name: wait-for-quality-gates
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      ready: ${{ steps.evaluate.outputs.ready }}

    steps:
      - name: Verify all quality workflows succeeded
        id: evaluate
        uses: actions/github-script@v7
        with:
          script: |
            const requiredWorkflows = ["Pest", "PHPStan", "Pint", "Rector", "CI Canary"];
            const headSha = context.payload.workflow_run.head_sha;
            const eventName = context.payload.workflow_run.event;
            const { owner, repo } = context.repo;

            const runsResponse = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              event: eventName,
              head_sha: headSha,
              per_page: 100,
            });

            const latestRunByName = new Map();
            for (const run of runsResponse.data.workflow_runs) {
              if (!requiredWorkflows.includes(run.name)) {
                continue;
              }

              const current = latestRunByName.get(run.name);
              if (!current || run.id > current.id) {
                latestRunByName.set(run.name, run);
              }
            }

            const missing = requiredWorkflows.filter((name) => !latestRunByName.has(name));
            const failed = requiredWorkflows
              .map((name) => latestRunByName.get(name))
              .filter(Boolean)
              .filter((run) => run.conclusion !== "success")
              .map((run) => `${run.name}=${run.conclusion ?? "unknown"}`);

            const ready = missing.length === 0 && failed.length === 0;
            core.setOutput("ready", ready ? "true" : "false");

            if (!ready) {
              core.notice(
                `Quality gates not ready for ${headSha}: missing=[${missing.join(", ")}] failed=[${failed.join(", ")}]`,
              );
            }

  vm-tests-ubuntu24:
    needs: quality-gate
    name: vm-tests (ubuntu24)
    if: ${{ needs.quality-gate.outputs.ready == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    concurrency:
      group: bats-vm-ubuntu24-${{ github.event.workflow_run.head_sha }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup PHP and Composer
        uses: ./.github/actions/setup-php-composer

      - name: Install BATS and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq

      - name: Setup Lima
        uses: lima-vm/lima-actions/setup@v1

      - name: Setup test fixtures
        run: |
          mkdir -p tests/bats/fixtures/keys tests/bats/fixtures/inventory
          ssh-keygen -t ed25519 -f tests/bats/fixtures/keys/id_test -N "" -C "deployer-bats-test"

      - name: Setup environment file
        run: |
          cat <<'EOF' > .env
          ${{ secrets.DOTENV_FILE }}
          EOF

      - name: Run VM tests for ubuntu24
        env:
          CI: "true"
          BATS_DISTRO: ubuntu24
        run: ./bats.sh ci vm ubuntu24
