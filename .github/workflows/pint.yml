name: Pint

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "app/**"
      - "bin/**"
      - "tests/**"
      - "*.php"
      - "pint.json"
      - "composer.json"
      - "composer.lock"
      - ".github/actions/setup-php-composer/**"
      - ".github/workflows/pint.yml"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "bin/**"
      - "tests/**"
      - "*.php"
      - "pint.json"
      - "composer.json"
      - "composer.lock"
      - ".github/actions/setup-php-composer/**"
      - ".github/workflows/pint.yml"

jobs:
  pint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP and Composer
        uses: ./.github/actions/setup-php-composer

      - name: Run code style check
        run: vendor/bin/pint --test --parallel
