name: BATS Cloud Tests (AWS)

permissions:
  contents: read
  actions: read

on:
  workflow_run:
    workflows: ["BATS VM Tests (Ubuntu 24.04)"]
    types: [completed]

jobs:
  vm-gate:
    name: verify-vm-success
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      ready: ${{ steps.evaluate.outputs.ready }}

    steps:
      - name: Verify VM job concluded with success
        id: evaluate
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const workflowRunId = context.payload.workflow_run.id;
            const expectedJobName = "vm-tests (ubuntu24)";

            const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: workflowRunId,
              per_page: 100,
            });

            const vmJob = jobsResponse.data.jobs.find((job) => job.name === expectedJobName);
            const ready = vmJob?.conclusion === "success";
            core.setOutput("ready", ready ? "true" : "false");

            if (!ready) {
              core.notice(
                `Skipping cloud run because '${expectedJobName}' was not successful (conclusion=${vmJob?.conclusion ?? "missing"})`,
              );
            }

  cloud-tests-aws:
    needs: vm-gate
    name: cloud-tests (aws)
    if: ${{ needs.vm-gate.outputs.ready == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    concurrency:
      group: bats-cloud-aws-${{ github.event.workflow_run.head_sha }}
      cancel-in-progress: true

    env:
      CI: "true"
      BATS_RUN_SUFFIX: ${{ github.run_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup PHP and Composer
        uses: ./.github/actions/setup-php-composer

      - name: Install BATS and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq curl
          aws --version

      - name: Setup environment file
        run: |
          cat <<'EOF' > .env
          ${{ secrets.DOTENV_FILE }}
          EOF

      - name: Setup SSH key for cloud provisioning
        run: |
          mkdir -p ~/.ssh tests/bats/fixtures/keys
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          cp ~/.ssh/id_ed25519.pub tests/bats/fixtures/keys/id_test.pub

      - name: Run AWS tests
        run: |
          set -a
          # shellcheck disable=SC1091
          source .env
          set +a
          ./bats.sh ci cloud aws

      - name: Cleanup cloud resources (backstop)
        if: always()
        run: |
          set -a
          # shellcheck disable=SC1091
          source .env
          set +a
          tests/bats/lib/cloud-janitor.sh \
            --mode=targeted \
            --suffix="${BATS_RUN_SUFFIX}" \
            --providers="aws"
